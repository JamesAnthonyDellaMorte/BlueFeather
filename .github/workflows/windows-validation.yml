name: windows-validation

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout BlueFeather
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: >
          cmake -S . -B build/x64
          -G "Visual Studio 17 2022"
          -T v143
          -A x64
          -DCMAKE_BUILD_TYPE=Debug
          -DUSE_AUTO_VCPKG=ON

      - name: Build
        run: cmake --build build/x64 --config Debug --parallel 10 --target BlueFeather
